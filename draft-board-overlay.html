<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noai, noimageai, noindex, nofollow">
<title>KW5 Draft Board</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --gold:#f0c040;
  --dark:#0d0f14;
  --dark2:#13161e;
  --dark3:#1a1e2a;
  --dark4:#222736;
  --border:rgba(255,255,255,0.07);
  --text:#e8eaf0;
  --muted:#7a8099;
  --green:#4ade80;
  --red:#f87171;
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  background:#0d0f14;
  color:var(--text);
  font-family:'Barlow',sans-serif;
  width:1920px;
  height:1080px;
  overflow:hidden;
}
@media(max-width:1920px){
  body{width:100%;height:100vh;min-height:100vh;}
}

/* ── HEADER ── */
.header{
  background:linear-gradient(180deg,#1a1e2a 0%,#13161e 100%);
  border-bottom:3px solid var(--gold);
  padding:0 32px;
  height:64px;
  display:flex;
  align-items:center;
  gap:16px;
}
.header-logo{
  font-family:'Barlow Condensed',sans-serif;
  font-size:28px;font-weight:900;
  color:var(--gold);letter-spacing:.08em;
}
.header-sub{
  font-size:12px;color:var(--muted);
  text-transform:uppercase;letter-spacing:.12em;
  border-left:2px solid var(--border);
  padding-left:16px;margin-left:4px;
}
.header-right{margin-left:auto;display:flex;align-items:center;gap:24px}
.header-stat{text-align:center}
.header-stat-val{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:900;color:var(--gold);line-height:1}
.header-stat-lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em}

/* ── BOARD ── */
.board{
  display:flex;
  flex-direction:column;
  gap:5px;
  padding:8px 12px;
  height:calc(1080px - 64px - 72px);
}
@media(max-width:1920px){
  .board{height:calc(100vh - 64px - 72px);}
}

/* ── TEAM CARD ── */
.team-card{
  background:#13161e;
  border:1px solid var(--border);
  border-radius:6px;
  overflow:hidden;
}
.team-card.otc{
  border-color:var(--gold);
  box-shadow:0 0 16px rgba(240,192,64,.2);
}
.team-header{
  padding:8px 12px;
  display:flex;
  align-items:center;
  gap:10px;
  background:rgba(0,0,0,.3);
  border-bottom:1px solid var(--border);
  flex-shrink:0;
}
.team-logo{width:28px;height:28px;border-radius:50%;object-fit:cover;flex-shrink:0}
.team-logo-ph{
  width:28px;height:28px;border-radius:50%;
  background:var(--dark4);display:flex;align-items:center;justify-content:center;
  font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:12px;color:var(--gold);flex-shrink:0;
}
.team-name-text{
  font-family:'Barlow Condensed',sans-serif;
  font-weight:800;font-size:16px;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;
}
.team-abbr{font-size:12px;color:var(--muted);font-weight:700;letter-spacing:.05em;flex-shrink:0}
.otc-dot{width:7px;height:7px;border-radius:50%;background:var(--gold);flex-shrink:0;animation:blink 1s infinite alternate}
@keyframes blink{to{opacity:.2}}

/* ── PICK ROWS ── */
.pick-row{
  padding:6px 12px;
  display:flex;
  align-items:center;
  gap:10px;
  border-bottom:1px solid rgba(255,255,255,.04);
  flex:1;
}
.pick-row.empty{opacity:.3}
.pick-num{
  font-family:'Barlow Condensed',sans-serif;
  font-size:13px;color:var(--muted);
  min-width:28px;flex-shrink:0;
}
.pick-pos{
  font-family:'Barlow Condensed',sans-serif;
  font-weight:800;font-size:12px;
  padding:2px 6px;border-radius:3px;
  min-width:36px;text-align:center;flex-shrink:0;
}
.pick-name{
  font-family:'Barlow Condensed',sans-serif;
  font-weight:700;font-size:17px;
  flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}
.pick-ovr{
  font-family:'Barlow Condensed',sans-serif;
  font-weight:900;font-size:20px;
  flex-shrink:0;min-width:32px;text-align:right;
}
.ovr-s{color:#ffd700}.ovr-a{color:#4ade80}.ovr-b{color:#60a5fa}.ovr-c{color:#fb923c}.ovr-d{color:var(--muted)}

/* ── BOTTOM PICK BAR ── */
.pick-bar{
  position:fixed;bottom:0;left:0;right:0;
  height:72px;
  background:linear-gradient(90deg,#0d1520 0%,#13161e 60%,#0d0f14 100%);
  border-top:3px solid var(--gold);
  display:flex;align-items:center;
  padding:0 32px;gap:24px;
  z-index:100;
}
.pick-bar-logo{
  width:48px;height:48px;border-radius:50%;
  border:2px solid var(--gold);overflow:hidden;
  background:var(--dark4);display:flex;align-items:center;justify-content:center;
  font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:18px;color:var(--gold);
  flex-shrink:0;
}
.pick-bar-logo img{width:100%;height:100%;object-fit:cover}
.pick-bar-left{display:flex;flex-direction:column}
.pick-bar-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.12em;font-weight:700}
.pick-bar-team{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:900;color:var(--gold);line-height:1.1}
.pick-bar-round{font-size:11px;color:var(--muted)}
.pick-bar-mid{flex:1;display:flex;align-items:center;justify-content:center;gap:32px}
.pick-bar-player{font-family:'Barlow Condensed',sans-serif;font-size:38px;font-weight:900;color:var(--text);letter-spacing:.02em}
.pick-bar-pos{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:800;padding:3px 10px;border-radius:5px}
.pick-bar-ovr{font-family:'Barlow Condensed',sans-serif;font-size:42px;font-weight:900;color:var(--gold)}
.pick-bar-num{font-family:'Barlow Condensed',sans-serif;font-size:13px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em}
.pick-bar-timer{font-family:'Barlow Condensed',sans-serif;font-size:42px;font-weight:900;color:var(--text);min-width:90px;text-align:right}
.pick-bar-timer.urgent{color:var(--red);animation:pulse .5s infinite alternate}
@keyframes pulse{to{opacity:.3}}

/* ── ROUND SPLASH ── */
.round-splash{
  position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
  background:rgba(13,15,20,.82);z-index:200;pointer-events:none;
  animation:sIn .3s ease, sOut .4s 2.5s ease forwards;
}
@keyframes sIn{from{opacity:0}to{opacity:1}}
@keyframes sOut{from{opacity:1}to{opacity:0}}
.round-text{
  font-family:'Barlow Condensed',sans-serif;
  font-size:150px;font-weight:900;color:var(--gold);letter-spacing:.06em;
  text-shadow:0 0 80px rgba(240,192,64,.5);
  animation:scl .4s cubic-bezier(.22,.68,0,1.2);
}
@keyframes scl{from{transform:scale(.3);opacity:0}to{transform:scale(1);opacity:1}}

/* ── PICK ANNOUNCE (new pick flash) ── */
.pa-flash{
  position:fixed;bottom:72px;left:0;right:0;
  background:rgba(240,192,64,.12);border-top:1px solid rgba(240,192,64,.3);
  padding:8px 32px;display:flex;align-items:center;gap:16px;
  animation:paIn .3s ease;z-index:170;
}
@keyframes paIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.pa-flash-label{font-size:10px;color:var(--gold);text-transform:uppercase;letter-spacing:.15em;font-weight:800}
.pa-flash-player{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:900}
.pa-flash-team{font-size:13px;color:var(--muted)}

/* ── CAM OVERLAY ── */
#cam-overlay{position:fixed;inset:0;z-index:150;display:none;background:#000;animation:fadeInOvl .4s ease}
@keyframes fadeInOvl{from{opacity:0}to{opacity:1}}
#cam-overlay iframe{position:absolute;inset:0;width:100%;height:100%;border:none}
#cam-info-bar{
  position:absolute;top:0;left:0;right:0;height:100px;
  background:linear-gradient(180deg,rgba(13,15,20,.92) 0%,transparent 100%);
  z-index:1;display:flex;align-items:center;padding:0 44px;gap:18px;pointer-events:none;
}
#cam-pick-bar{
  position:absolute;bottom:0;left:0;right:0;height:72px;
  background:linear-gradient(0deg,rgba(13,15,20,.95) 0%,transparent 100%);
  border-top:3px solid var(--gold);
  z-index:1;display:flex;align-items:center;padding:0 32px;gap:16px;pointer-events:none;
}

/* ── HIGHLIGHT OVERLAY ── */
#hl-overlay{position:fixed;inset:0;z-index:160;display:none;background:#000;animation:fadeInOvl .3s ease}
#hl-overlay iframe{position:absolute;top:0;left:0;width:100%;height:calc(100% - 96px);border:none}
#hl-bar{
  position:absolute;bottom:0;left:0;right:0;height:96px;
  background:linear-gradient(0deg,rgba(13,15,20,.98) 0%,rgba(13,15,20,.6) 100%);
  border-top:3px solid var(--gold);
  display:flex;align-items:center;padding:0 40px;gap:20px;
}

/* ── MOBILE / PHONE ── */
@media(max-width:900px){
  .header{height:48px;padding:0 12px;gap:8px}
  .header-logo{font-size:20px}
  .header-sub{display:none}
  .header-stat-val{font-size:16px}
  .header-stat-lbl{font-size:9px}
  .board{
    height:calc(100vh - 48px - 56px);
    padding:4px 6px;gap:3px;
  }
  .team-header{padding:4px 8px;gap:6px}
  .team-logo{width:20px;height:20px}
  .team-logo-ph{width:20px;height:20px;font-size:10px}
  .team-name-text{font-size:13px}
  .team-abbr{font-size:11px}
  .pick-row{padding:4px 8px;gap:6px}
  .pick-num{font-size:11px;min-width:22px}
  .pick-pos{font-size:11px;padding:1px 4px;min-width:30px}
  .pick-name{font-size:15px}
  .pick-ovr{font-size:17px;min-width:26px}
  .pick-bar{height:56px;padding:0 12px;gap:12px}
  .pick-bar-logo{width:36px;height:36px;font-size:14px}
  .pick-bar-team{font-size:16px}
  .pick-bar-round{font-size:10px}
  .pick-bar-player{font-size:24px}
  .pick-bar-ovr{font-size:28px}
  .pick-bar-timer{font-size:28px;min-width:60px}
}
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-logo" id="draft-name">KW5 DRAFT</div>
  <div class="header-sub">Draft Board</div>
  <div class="header-right">
    <div class="header-stat">
      <div class="header-stat-val" id="hdr-picks">0</div>
      <div class="header-stat-lbl">Picks Made</div>
    </div>
    <div class="header-stat">
      <div class="header-stat-val" id="hdr-round">—</div>
      <div class="header-stat-lbl">Round</div>
    </div>
    <div class="header-stat">
      <div class="header-stat-val" id="hdr-remaining">—</div>
      <div class="header-stat-lbl">Remaining</div>
    </div>
  </div>
</div>

<!-- BOARD -->
<div class="board" id="board"></div>

<!-- BOTTOM BAR -->
<div class="pick-bar" id="pick-bar">
  <div class="pick-bar-logo" id="pb-logo"></div>
  <div class="pick-bar-left">
    <div class="pick-bar-label" id="pb-label">ON THE CLOCK</div>
    <div class="pick-bar-team" id="pb-team">—</div>
    <div class="pick-bar-round" id="pb-round"></div>
  </div>
  <div class="pick-bar-mid" id="pb-mid">
    <div style="text-align:center">
      <div class="pick-bar-num">Waiting for draft to start...</div>
    </div>
  </div>
  <div style="text-align:right">
    <div class="pick-bar-label">TIME LEFT</div>
    <div class="pick-bar-timer" id="pb-timer">—</div>
  </div>
</div>

<!-- ROUND SPLASH -->
<div id="splash-wrap"></div>
<!-- PICK ANNOUNCE FLASH -->
<div id="pa-flash-wrap"></div>

<!-- CAM OVERLAY -->
<div id="cam-overlay">
  <iframe id="cam-iframe" allow="camera;microphone;autoplay" allowfullscreen></iframe>
  <div id="cam-info-bar">
    <div style="width:10px;height:10px;border-radius:50%;background:var(--gold);animation:blink 1s infinite alternate;flex-shrink:0"></div>
    <div id="cam-team-logo-el"></div>
    <div>
      <div style="font-size:11px;color:var(--gold);text-transform:uppercase;letter-spacing:.15em;font-weight:700">On The Clock</div>
      <div id="cam-team-name" style="font-family:'Barlow Condensed',sans-serif;font-size:44px;font-weight:900;line-height:1;color:#fff"></div>
    </div>
    <div style="margin-left:auto;text-align:right">
      <div style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.12em">Time Left</div>
      <div id="cam-timer" style="font-family:'Barlow Condensed',sans-serif;font-size:44px;font-weight:900;color:#fff">—</div>
    </div>
  </div>
  <div id="cam-pick-bar">
    <div id="cam-pick-info" style="font-family:'Barlow Condensed',sans-serif;font-size:14px;color:var(--muted)"></div>
  </div>
</div>

<!-- HIGHLIGHT OVERLAY -->
<div id="hl-overlay">
  <iframe id="hl-iframe" allow="autoplay" allowfullscreen></iframe>
  <div id="hl-bar">
    <div id="hl-team-logo-el"></div>
    <div style="flex:1;min-width:0">
      <div id="hl-pick-label" style="font-size:11px;color:var(--gold);text-transform:uppercase;letter-spacing:.15em;font-weight:700"></div>
      <div id="hl-player-name" style="font-family:'Barlow Condensed',sans-serif;font-size:52px;font-weight:900;line-height:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap"></div>
    </div>
    <div id="hl-pos-badge"></div>
    <div style="margin-left:auto;text-align:right;flex-shrink:0">
      <div style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em">Highlight ends in</div>
      <div id="hl-countdown" style="font-family:'Barlow Condensed',sans-serif;font-size:32px;font-weight:900;color:var(--muted)"></div>
    </div>
  </div>
</div>

<script>
const params = new URLSearchParams(location.search);
const WORKER_URL = (params.get('w') || '').replace(/\/+$/, '');

let ds = null, timerInterval = null, lastPickNum = -1, lastRound = 0, paFlashTimeout = null;
let currentCamTeamId = null, hlTimeout = null, hlCountInterval = null, timerPaused = false, timerEndsAt = null;

// ── HELPERS ──
function buildSeq(ds) {
  const seq = [];
  for (let r = 0; r < ds.config.perTeam; r++) {
    let ord = ds.config.format === 'snake'
      ? (r%2===0 ? [...ds.order] : [...ds.order].reverse())
      : [...ds.order];
    ord.forEach(tid => seq.push({ teamId: tid, round: r+1 }));
  }
  return seq;
}

function getCurrentPick(ds) {
  if (!ds || ds.status === 'idle') return null;
  const seq = buildSeq(ds);
  const idx = ds.currentPickNum || 0;
  if (idx >= seq.length) return null;
  const { teamId, round } = seq[idx];
  return { teamId, round, pickNum: idx+1, totalPicks: seq.length, team: ds.teams.find(t=>t.id===teamId) };
}

function ovrClass(ovr) {
  if (ovr >= 85) return 'ovr-s';
  if (ovr >= 75) return 'ovr-a';
  if (ovr >= 65) return 'ovr-b';
  if (ovr >= 55) return 'ovr-c';
  return 'ovr-d';
}

function posStyle(pos) {
  const styles = {
    'PG': {bg:'rgba(96,165,250,.2)',  tc:'#93c5fd'},
    'SG': {bg:'rgba(96,165,250,.2)',  tc:'#93c5fd'},
    'SF': {bg:'rgba(196,181,253,.2)', tc:'#c4b5fd'},
    'LCK':{bg:'rgba(196,181,253,.2)', tc:'#c4b5fd'},
    'PF': {bg:'rgba(196,181,253,.2)', tc:'#c4b5fd'},
    'C':  {bg:'rgba(134,239,172,.2)', tc:'#86efac'},
  };
  return styles[pos] || {bg:'rgba(255,255,255,.1)', tc:'var(--muted)'};
}

function logoHtml(team, size=22) {
  if (team.logoB64) return '<img src="'+team.logoB64+'" style="width:'+size+'px;height:'+size+'px;border-radius:50%;object-fit:cover;flex-shrink:0">';
  return '<div style="width:'+size+'px;height:'+size+'px;border-radius:50%;background:var(--dark4);display:flex;align-items:center;justify-content:center;font-family:Barlow Condensed,sans-serif;font-weight:900;font-size:'+(size*0.45|0)+'px;color:var(--gold);flex-shrink:0">'+((team.name||'?')[0])+'</div>';
}

// ── TIMER ──
function startTimer(endsAt) {
  clearInterval(timerInterval);
  timerEndsAt = endsAt;
  const el    = document.getElementById('pb-timer');
  const camEl = document.getElementById('cam-timer');
  timerInterval = setInterval(() => {
    const left = Math.max(0, Math.round((new Date(endsAt) - Date.now()) / 1000));
    const str  = String(Math.floor(left/60)).padStart(2,'0')+':'+String(left%60).padStart(2,'0');
    if (el)    { el.textContent = str; el.classList.toggle('urgent', left <= 15); }
    if (camEl)   camEl.textContent = str;
  }, 500);
}

// ── PICK ANNOUNCE FLASH ──
function checkNewPick(ds) {
  const picks = ds.picks || [];
  const latest = picks[picks.length-1];
  if (!latest) return;
  if (lastPickNum === -1) { lastPickNum = latest.pickNum; return; }
  if (latest.pickNum === lastPickNum) return;
  lastPickNum = latest.pickNum;
  const team   = ds.teams.find(t=>t.id===latest.teamId)||{};
  const player = (ds.players||[]).find(p=>p.id===latest.playerId)||{};
  showPickFlash(latest, team, player);
  showHighlight(latest, team, player);
}

function showPickFlash(pick, team, player) {
  clearTimeout(paFlashTimeout);
  const cfg = ds?.config || {};
  const showOvr   = cfg.showOvr   !== false;
  const showStars = cfg.showStars !== false;
  const starsFlash = (showStars && player.stars > 0)
    ? '<span style="color:#f59e0b;font-size:18px;letter-spacing:2px">'+'★'.repeat(player.stars)+'</span>'
    : '';
  const wrap = document.getElementById('pa-flash-wrap');
  const { bg, tc } = posStyle(player.pos||'');
  wrap.innerHTML = '<div class="pa-flash">'
    +logoHtml(team, 32)
    +'<div>'
    +'<div class="pa-flash-label">Pick #'+pick.pickNum+'</div>'
    +'<div class="pa-flash-player">'+pick.playerId+' <span class="pick-pos" style="background:'+bg+';color:'+tc+';font-size:12px;padding:1px 6px;border-radius:3px">'+(player.pos||'?')+'</span></div>'
    +(starsFlash ? '<div>'+starsFlash+'</div>' : '')
    +'</div>'
    +'<div class="pa-flash-team">'+team.name+'</div>'
    +(showOvr ? '<div style="margin-left:auto;font-family:Barlow Condensed,sans-serif;font-size:32px;font-weight:900;color:var(--gold)">'+(player.ovr||'?')+'</div>' : '')
    +'</div>';
  paFlashTimeout = setTimeout(() => { wrap.innerHTML = ''; }, 6000);
}

// ── ROUND SPLASH ──
function checkRound(ds) {
  const seq = ds.status==='live' ? buildSeq(ds) : [];
  const idx = ds.currentPickNum||0;
  if (!seq.length) return;
  const cur  = idx < seq.length ? seq[idx]?.round : null;
  const prev = idx > 0 ? seq[idx-1]?.round : 0;
  if (cur && prev && cur !== prev && cur !== lastRound) {
    lastRound = cur;
    const wrap = document.getElementById('splash-wrap');
    wrap.innerHTML = '<div class="round-splash"><div class="round-text">ROUND '+cur+'</div></div>';
    setTimeout(() => { wrap.innerHTML = ''; }, 3200);
  }
}

// ── RENDER ──
function render() {
  if (!ds) return;
  checkNewPick(ds);
  checkRound(ds);

  const pick   = getCurrentPick(ds);
  const status = ds.status || 'idle';
  const picks  = ds.picks || [];
  const seq    = buildSeq(ds);

  // Header
  document.getElementById('draft-name').textContent = ds.config?.name || 'KW5 DRAFT';
  document.getElementById('hdr-picks').textContent = picks.length;
  document.getElementById('hdr-round').textContent = pick ? pick.round : (status==='done'?'—':'—');
  document.getElementById('hdr-remaining').textContent = pick ? (pick.totalPicks - picks.length) : 0;

  // Bottom bar
  if (pick) {
    const pbLogo = document.getElementById('pb-logo');
    if (pick.team?.logoB64) pbLogo.innerHTML = '<img src="'+pick.team.logoB64+'" style="width:100%;height:100%;object-fit:cover">';
    else pbLogo.textContent = (pick.team?.name||'?')[0];
    document.getElementById('pb-team').textContent  = pick.team?.name || '—';
    document.getElementById('pb-round').textContent = 'Round '+pick.round+' · Pick #'+pick.pickNum+' of '+pick.totalPicks;
    document.getElementById('pb-label').textContent = 'ON THE CLOCK';
    document.getElementById('pb-mid').innerHTML = '<div style="font-family:Barlow Condensed,sans-serif;font-size:16px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em">Waiting for pick...</div>';
    if (status==='live' && ds.timerEnd && !timerPaused) startTimer(ds.timerEnd);
    else if (!ds.timerEnd) { clearInterval(timerInterval); document.getElementById('pb-timer').textContent='—'; const c=document.getElementById('cam-timer'); if(c) c.textContent='—'; }
  } else if (status==='done') {
    document.getElementById('pb-label').textContent = '';
    document.getElementById('pb-team').textContent  = 'DRAFT COMPLETE';
    document.getElementById('pb-round').textContent = picks.length + ' total picks';
    document.getElementById('pb-logo').textContent  = '';
    document.getElementById('pb-mid').innerHTML     = '';
    document.getElementById('pb-timer').textContent = '—';
    clearInterval(timerInterval);
  }

  // Cam overlay — update when OTC team changes (don't touch if highlight is playing)
  if (!timerPaused) {
    if (pick && status === 'live' && pick.team?.camUrl) {
      if (pick.teamId !== currentCamTeamId) showCam(pick.team, pick);
    } else if (!pick || status !== 'live') {
      hideCam();
    }
  }

  // Board
  const SLOTS = ['PG','SG','LCK','PF','C'];
  const perTeam = ds.config?.perTeam || 5;
  const extraSlots = Math.max(0, perTeam - SLOTS.length);
  const slots = [...SLOTS, ...Array.from({length:extraSlots},(_,i)=>'F'+(i+1))];

  const teamsPerRow = 6;
  const board = document.getElementById('board');
  board.style.gridTemplateColumns = '1fr';
  board.style.gridTemplateRows = 'repeat(2,1fr)';

  // Split teams into two rows
  const rows = [ds.teams.slice(0, teamsPerRow), ds.teams.slice(teamsPerRow)];

  board.innerHTML = rows.map(rowTeams => {
    if (!rowTeams.length) return '';
    return '<div style="display:grid;grid-template-columns:repeat('+rowTeams.length+',1fr);gap:5px;flex:1;min-height:0">'
      + rowTeams.map(t => {
    const teamPicks = picks.filter(p=>p.teamId===t.id);
    const isOtc = pick && pick.teamId === t.id;
    const logoEl = t.logoB64
      ? '<img src="'+t.logoB64+'" class="team-logo">'
      : '<div class="team-logo-ph">'+((t.name||'?')[0])+'</div>';

    // Fill position slots
    const filled = {}, flexQ = [];
    teamPicks.forEach(p => {
      const pl = (ds.players||[]).find(x=>x.id===p.playerId)||{};
      const sp = pl.pos==='SF'?'LCK':pl.pos||'';
      if (slots.includes(sp) && !filled[sp]) filled[sp] = { p, pl };
      else flexQ.push({ p, pl });
    });

    const pickRows = slots.map(slot => {
      const entry = filled[slot] || (slot.startsWith('F') && flexQ.length ? flexQ.shift() : null);
      const posKey = slot === 'LCK' ? 'SF' : slot;
      const { bg, tc } = posStyle(posKey);
      if (!entry) {
        return '<div class="pick-row empty">'
          +'<span class="pick-pos" style="background:'+bg+';color:'+tc+'">'+slot+'</span>'
          +'<span class="pick-name" style="color:var(--muted)">—</span>'
          +'</div>';
      }
      const { p, pl } = entry;
      const isFlex = !['PG','SG','LCK','PF','C'].includes(slot);
      const actualPos = isFlex ? (pl.pos==='SF'?'LCK':(pl.pos||slot)) : slot;
      const { bg: rowBg, tc: rowTc } = posStyle(actualPos==='LCK'?'SF':actualPos);
      const showOvr   = ds?.config?.showOvr   !== false;
      const showStars = ds?.config?.showStars !== false;
      const starsHtml = (showStars && pl.stars > 0)
        ? '<span style="color:#f59e0b;font-size:9px;letter-spacing:1px">'+'★'.repeat(pl.stars)+'</span>'
        : '';
      return '<div class="pick-row">'
        +'<span class="pick-num">#'+p.pickNum+'</span>'
        +'<span class="pick-pos" style="background:'+rowBg+';color:'+rowTc+'">'+actualPos+'</span>'
        +'<span class="pick-name">'+p.playerId+'</span>'
        +(starsHtml ? starsHtml : '')
        +(showOvr ? '<span class="pick-ovr '+ovrClass(pl.ovr||50)+'">'+(pl.ovr||'')+'</span>' : '')
        +'</div>';
    }).join('');

    return '<div class="team-card'+(isOtc?' otc':'')+'">'
      +'<div class="team-header">'
      +(isOtc?'<div class="otc-dot"></div>':'')
      +logoEl
      +'<div class="team-name-text">'+t.name+'</div>'
      +'<div class="team-abbr">'+teamPicks.length+'/'+perTeam+'</div>'
      +'</div>'
      +'<div style="display:flex;flex-direction:column;flex:1;overflow:hidden">'
      +pickRows
      +'</div>'
      +'</div>';
    }).join('')
    + '</div>';
  }).join('');
}

// ── CAM OVERLAY ──
function showCam(team, pick) {
  currentCamTeamId = team.id;
  const overlay = document.getElementById('cam-overlay');
  const iframe  = document.getElementById('cam-iframe');
  iframe.src = team.camUrl;
  document.getElementById('cam-team-name').textContent = team.name;
  const logoEl = document.getElementById('cam-team-logo-el');
  logoEl.innerHTML = team.logoB64
    ? '<img src="'+team.logoB64+'" style="width:56px;height:56px;border-radius:50%;object-fit:cover;border:2px solid var(--gold)">'
    : '<div style="width:56px;height:56px;border-radius:50%;background:var(--dark4);display:flex;align-items:center;justify-content:center;font-family:Barlow Condensed,sans-serif;font-weight:900;font-size:22px;color:var(--gold);border:2px solid var(--gold)">'+((team.name||'?')[0])+'</div>';
  const pickInfo = document.getElementById('cam-pick-info');
  if (pick) pickInfo.textContent = 'Round '+pick.round+' · Pick #'+pick.pickNum+' of '+pick.totalPicks;
  overlay.style.display = 'block';
}

function hideCam() {
  currentCamTeamId = null;
  const overlay = document.getElementById('cam-overlay');
  const iframe  = document.getElementById('cam-iframe');
  overlay.style.display = 'none';
  iframe.src = '';
}

// ── HIGHLIGHT OVERLAY ──
function showHighlight(pick, team, player) {
  const highlights = ds?.config?.highlights || {};
  const fileId = highlights[pick.playerId] || highlights[player.id] || highlights[player.name];
  if (!fileId) return;

  hideCam();
  clearTimeout(hlTimeout);
  clearInterval(hlCountInterval);
  clearInterval(timerInterval);
  timerPaused = true;

  const overlay = document.getElementById('hl-overlay');
  document.getElementById('hl-iframe').src = 'https://drive.google.com/file/d/'+fileId+'/preview?autoplay=1';
  document.getElementById('hl-pick-label').textContent = 'Pick #'+pick.pickNum+' · '+team.name;
  document.getElementById('hl-player-name').textContent = player.name || pick.playerId;
  const logoEl = document.getElementById('hl-team-logo-el');
  logoEl.innerHTML = team.logoB64
    ? '<img src="'+team.logoB64+'" style="width:64px;height:64px;border-radius:50%;object-fit:cover;border:2px solid var(--gold);flex-shrink:0">'
    : '<div style="width:64px;height:64px;border-radius:50%;background:var(--dark4);display:flex;align-items:center;justify-content:center;font-family:Barlow Condensed,sans-serif;font-weight:900;font-size:26px;color:var(--gold);border:2px solid var(--gold);flex-shrink:0">'+((team.name||'?')[0])+'</div>';
  const { bg, tc } = posStyle(player.pos||'');
  const posBadge = document.getElementById('hl-pos-badge');
  posBadge.innerHTML = '<span style="font-family:Barlow Condensed,sans-serif;font-weight:800;font-size:22px;padding:5px 16px;border-radius:6px;background:'+bg+';color:'+tc+'">'+(player.pos||'?')+'</span>';
  overlay.style.display = 'block';

  const duration = (ds?.config?.highlightDuration || 90);
  let remaining = duration;
  const cntEl = document.getElementById('hl-countdown');
  if (cntEl) cntEl.textContent = remaining+'s';
  hlCountInterval = setInterval(() => {
    remaining--;
    if (cntEl) cntEl.textContent = remaining > 0 ? remaining+'s' : '';
    if (remaining <= 0) clearInterval(hlCountInterval);
  }, 1000);

  hlTimeout = setTimeout(hideHighlight, duration * 1000);
}

function hideHighlight() {
  clearTimeout(hlTimeout);
  clearInterval(hlCountInterval);
  timerPaused = false;
  const overlay = document.getElementById('hl-overlay');
  overlay.style.display = 'none';
  document.getElementById('hl-iframe').src = '';
  if (ds?.timerEnd && ds?.status === 'live') startTimer(ds.timerEnd);
  const pick = getCurrentPick(ds);
  if (pick?.team?.camUrl) showCam(pick.team, pick);
}

async function load() {
  if (!WORKER_URL) return;
  try {
    const r = await fetch(WORKER_URL + '/draft-data');
    if (!r.ok) return;
    const d = await r.json();
    ds = d.record || d;
    render();
  } catch(e) {}
}

load();
setInterval(load, 3000);
</script>
</body>
